<header class="site-header" [class.menu-open]="sidebarOpen">
  <div class="container header-shell">
    <a class="brand" href="#home" (click)="onBrandClick()" aria-label="Go to home">
      <span class="brand-mark" aria-hidden="true"></span>
      <span class="brand-name">{{ brandName }}</span>
    </a>

    <button
      type="button"
      class="nav-toggle"
      [class.open]="sidebarOpen"
      [attr.aria-expanded]="sidebarOpen"
      aria-controls="main-menu"
      aria-label="Toggle navigation menu"
      (click)="toggleMenu()"
    >
      <span aria-hidden="true"></span>
    </button>

    <nav id="main-menu" class="nav-links" [class.is-open]="sidebarOpen" aria-label="Primary">
      <a
        *ngFor="let link of links; trackBy: trackById"
        class="nav-link"
        [class.active]="currentSection === link.id"
        [attr.aria-current]="currentSection === link.id ? 'page' : null"
        [href]="'#' + link.id"
        (click)="onNavClick(link.id)"
      >
        {{ link.label }}
      </a>

      <a class="resume-link" [href]="resumeUrl" download (click)="onResumeClick()">Resume</a>
    </nav>
  </div>
</header>
