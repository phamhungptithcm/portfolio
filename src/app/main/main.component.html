<main class="wrapper" id="scroll-container" role="main">
  <section id="home" class="spy-section home-section" aria-label="Home">
    <app-home></app-home>
  </section>

  <section id="work" class="spy-section section work-section" aria-label="Case Studies">
    <app-work></app-work>
  </section>

  <section id="experience" class="spy-section section experience-section" aria-label="Experience">
    <app-experience></app-experience>
  </section>

  <section id="services" class="spy-section section services-section" aria-label="What I Lead">
    <app-services></app-services>
  </section>

  <section id="about" class="spy-section section about-section" aria-label="About">
    <app-about></app-about>
  </section>

  <section id="contact" class="spy-section section contact-section" aria-label="Contact">
    <app-contact></app-contact>
  </section>

  <footer class="site-footer" aria-label="Footer">
    <div class="container footer-shell">
      <div>
        <p class="footer-brand">Hung Pham</p>
        <p class="footer-copy">Senior platform and applied AI engineer focused on backend systems, developer tooling, and reliable delivery.</p>
      </div>

      <div class="footer-links">
        <a href="mailto:phamhung.working@gmail.com">Email</a>
        <a href="https://www.linkedin.com/in/hunpham/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        <a href="https://github.com/phamhungptithcm" target="_blank" rel="noopener noreferrer">GitHub</a>
      </div>

      <p class="footer-meta">© {{ currentYear }} Hung Pham</p>
    </div>
  </footer>

  <button
    id="return-to-top"
    type="button"
    class="return-to-top"
    title="Back to top"
    aria-label="Back to top"
    (click)="scrollToTop()"
    [class.visible]="showBackToTop"
  >
    <i class="bi-arrow-up-circle-fill" aria-hidden="true"></i>
  </button>
</main>
